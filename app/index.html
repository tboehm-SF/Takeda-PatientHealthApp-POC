<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>For You With You: Zasocitinib</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Salesforce Embedded Messaging SDK (Agentforce MIAW) -->
    <script>
      // Hide the SDK's default floating button — our React UI controls visibility.
      // The button is rendered inside an embedded-messaging shadow root; we use
      // a MutationObserver to inject a <style> as soon as the container appears.
      (function hideDefaultButton() {
        var css = 'button.embeddedMessagingConversationButton { display: none !important; }';
        function injectStyle(container) {
          var root = container.shadowRoot;
          if (!root) return;
          if (root.querySelector('#esw-hide-btn')) return;
          var s = document.createElement('style');
          s.id = 'esw-hide-btn';
          s.textContent = css;
          root.appendChild(s);
        }
        // Also hide via top-level CSS for the container itself
        var topStyle = document.createElement('style');
        topStyle.textContent = '.embeddedMessagingFrame { display: none !important; }';
        document.head.appendChild(topStyle);

        var mo = new MutationObserver(function (mutations) {
          mutations.forEach(function (m) {
            m.addedNodes.forEach(function (n) {
              if (n.nodeType === 1 && n.classList && n.classList.contains('embeddedMessagingConversationButton')) {
                n.style.display = 'none';
              }
              if (n.shadowRoot) injectStyle(n);
            });
          });
        });
        mo.observe(document.body, { childList: true, subtree: true });
      })();

      // Initialize the SDK once the script loads
      function initEmbeddedMessaging() {
        try {
          embeddedservice_bootstrap.settings.language = 'en_US';
          embeddedservice_bootstrap.init(
            '00DHn000009hxPn',
            'Zasocitinib_Patient_Support',
            'https://storm-ffbfcc9fa2ad3e.my.site.com/ESWZasocitinibPatientSu1784554656094',
            { scrt2URL: 'https://storm-ffbfcc9fa2ad3e.my.salesforce-scrt.com' }
          );
          console.log('[Agentforce] Embedded Messaging SDK initialized');
        } catch (err) {
          console.error('[Agentforce] SDK init error:', err);
        }
      }
    </script>
    <script
      type="text/javascript"
      src="https://storm-ffbfcc9fa2ad3e.my.site.com/ESWZasocitinibPatientSu1784554656094/assets/js/bootstrap.min.js"
      onload="initEmbeddedMessaging()"
    ></script>
  </body>
</html>
