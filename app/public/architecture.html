<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Takeda Patient Health App — Architecture</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{
    background:#edf2f4;
    font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
    font-weight:400;color:#1a1a1a;
    display:flex;flex-direction:column;
  }
  header{
    display:flex;align-items:center;
    padding:12px 32px;
    background:#fff;
    border-bottom:1px solid #e0e0e0;
    flex-shrink:0;
  }
  header img{height:32px}
  .tabs{
    display:flex;gap:4px;
    padding:12px 32px 0;
    flex-shrink:0;
  }
  .tab-btn{
    font-family:inherit;font-size:14px;font-weight:500;
    letter-spacing:.02em;
    padding:10px 28px;
    background:#fff;
    border:none;
    border-bottom:3px solid transparent;
    border-radius:1.875rem 1.875rem 0 0;
    cursor:pointer;color:#555;
    transition:all .2s;
  }
  .tab-btn:hover{color:#BD120A}
  .tab-btn.active{color:#BD120A;border-bottom-color:#BD120A;background:#fff}
  .canvas-wrap{
    flex:1;
    margin:0 32px 20px;
    background:#fff;
    border-radius:0 1.875rem 1.875rem 1.875rem;
    overflow:hidden;
    position:relative;
    box-shadow:0 1px 6px rgba(0,0,0,.06);
  }
  .diagram-container{position:absolute;inset:0;display:none}
  .diagram-container.active{display:block}
  /* All three tabs: static Excalidraw SVG, centered & fit-to-panel (vector, zoomable) */
  #enrichment.active, #process.active, #datamodel.active{
    display:flex;align-items:center;justify-content:center;padding:16px
  }
  #enrichment img, #process img, #datamodel img{
    max-width:100%;max-height:100%;width:auto;height:auto;object-fit:contain
  }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    header{padding:10px 16px}
    header img{height:24px}
    .tabs{padding:8px 12px 0;gap:2px}
    .tab-btn{font-size:12px;padding:8px 14px}
    .canvas-wrap{margin:0 12px 12px;border-radius:0 1rem 1rem 1rem}
  }
  @media (max-width: 480px) {
    header{padding:8px 10px}
    header img{height:20px}
    .tabs{padding:6px 8px 0}
    .tab-btn{font-size:11px;padding:6px 10px}
    .canvas-wrap{margin:0 8px 8px;border-radius:0 .75rem .75rem .75rem}
  }
  /* tooltip */
  #tooltip{
    position:fixed;z-index:9999;
    pointer-events:none;opacity:0;
    transition:opacity .15s;
    background:#fff;border-radius:12px;
    box-shadow:0 8px 30px rgba(0,0,0,.14);
    padding:18px 20px;max-width:340px;min-width:240px;
    font-size:13px;line-height:1.45;
  }
  #tooltip.show{opacity:1}
  #tooltip .tt-icon{font-size:22px;margin-bottom:4px}
  #tooltip .tt-title{font-weight:600;font-size:15px;color:#1a1a1a;margin-bottom:2px}
  #tooltip .tt-sub{font-size:12px;color:#666;margin-bottom:10px}
  #tooltip .tt-section{margin-bottom:8px}
  #tooltip .tt-label{font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:#BD120A;margin-bottom:2px}
  #tooltip .tt-text{color:#333}
</style>
</head>
<body>

<header>
  <img src="https://assets-dam.takeda.com/image/upload/c_lfill,w_1920/v1/migration/dd376054054162cb1dd2807ef9d39eee5effe406-720x257" alt="Takeda">
</header>

<div class="tabs">
  <button class="tab-btn active" data-tab="enrichment">Architecture Enrichment</button>
  <button class="tab-btn" data-tab="process">Data Flow Process</button>
  <button class="tab-btn" data-tab="datamodel">Data Model</button>
</div>

<div class="canvas-wrap">
  <div id="enrichment" class="diagram-container active">
    <img src="enrichment.svg" alt="Takeda Patient Health App — Hybrid Reference Architecture: AWS medallion lakehouse × Salesforce Data Cloud / Health Cloud / Agentforce × Aprimo DAM, with an 8-step data flow from ingestion to feedback loop.">
  </div>
  <div id="process" class="diagram-container">
    <img src="process.svg" alt="End-to-End Patient Data Journey: 8-step process from mobile app ingestion through AWS data engineering, Salesforce intelligence & engagement, content delivery, and feedback loop.">
  </div>
  <div id="datamodel" class="diagram-container">
    <img src="datamodel.svg" alt="Takeda Patient Health App — Data Model: 5 system zones (Mobile App, Health Cloud, Data Cloud, MC Next/P13n, Agentforce) with entity relationships.">
  </div>
</div>


<script>
(function(){
/* ───── Tab switching (3 static Excalidraw SVG tabs) ───── */
var tabBtns = document.querySelectorAll('.tab-btn');

function showTab(tab){
  for(var i = 0; i < tabBtns.length; i++){
    tabBtns[i].classList.toggle('active', tabBtns[i].getAttribute('data-tab') === tab);
  }
  var panels = document.querySelectorAll('.diagram-container');
  for(var j = 0; j < panels.length; j++){
    panels[j].classList.toggle('active', panels[j].id === tab);
  }
  history.replaceState(null, null, '#' + tab);
}

for(var i = 0; i < tabBtns.length; i++){
  tabBtns[i].addEventListener('click', (function(btn){
    return function(){ showTab(btn.getAttribute('data-tab')); };
  })(tabBtns[i]));
}

function fromHash(){
  var h = location.hash.replace('#','');
  if(h === 'process') return 'process';
  if(h === 'datamodel') return 'datamodel';
  return 'enrichment';
}

window.addEventListener('hashchange', function(){ showTab(fromHash()); });
showTab(fromHash());

})();
</script>
</body>
</html>
