<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="windowLight" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#fef3c7" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#fef3c7" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="skinTone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#c4956a"/>
    </linearGradient>
    <linearGradient id="hair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a3728"/>
      <stop offset="100%" stop-color="#3d2e20"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <clipPath id="windowClip">
      <rect x="460" y="30" width="180" height="260" rx="8"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Soft atmospheric shapes -->
  <circle cx="650" cy="80" r="200" fill="#ffffff" opacity="0.04"/>
  <circle cx="100" cy="350" r="180" fill="#ffffff" opacity="0.03"/>

  <!-- Window frame -->
  <g filter="shadow">
    <rect x="455" y="25" width="190" height="270" rx="10" fill="#ffffff" opacity="0.15"/>
    <rect x="460" y="30" width="180" height="260" rx="8" fill="#fef3c7" opacity="0.25"/>
    <!-- Window panes -->
    <line x1="550" y1="30" x2="550" y2="290" stroke="#ffffff" stroke-width="2" opacity="0.3"/>
    <line x1="460" y1="160" x2="640" y2="160" stroke="#ffffff" stroke-width="2" opacity="0.3"/>
  </g>

  <!-- Sunlight rays through window -->
  <g opacity="0.12">
    <polygon points="460,30 300,200 350,250 550,50" fill="#fef3c7"/>
    <polygon points="550,30 380,220 420,260 640,40" fill="#fef3c7"/>
  </g>

  <!-- Plant on windowsill -->
  <g transform="translate(615, 245)">
    <rect x="-14" y="10" width="28" height="30" rx="4" fill="#d97706" opacity="0.6"/>
    <!-- Leaves -->
    <ellipse cx="-12" cy="-5" rx="10" ry="18" fill="#22c55e" opacity="0.7" transform="rotate(-25 -12 -5)"/>
    <ellipse cx="5" cy="-12" rx="9" ry="20" fill="#16a34a" opacity="0.7" transform="rotate(10 5 -12)"/>
    <ellipse cx="15" cy="-2" rx="8" ry="16" fill="#22c55e" opacity="0.6" transform="rotate(30 15 -2)"/>
    <line x1="0" y1="10" x2="-12" y2="-5" stroke="#15803d" stroke-width="1.5" opacity="0.5"/>
    <line x1="0" y1="10" x2="5" y2="-12" stroke="#15803d" stroke-width="1.5" opacity="0.5"/>
    <line x1="0" y1="10" x2="15" y2="-2" stroke="#15803d" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Floor / sitting surface -->
  <path d="M0 320 Q400 300 800 320 L800 400 L0 400Z" fill="#ffffff" opacity="0.06"/>

  <!-- Person sitting by window — looking right toward light -->
  <g transform="translate(320, 160)">
    <!-- Body / torso (sweater) -->
    <path d="M-30 60 Q-35 20 -15 0 Q0 -10 15 0 Q35 20 30 60 Q25 100 0 110 Q-25 100 -30 60Z" fill="#e9d5ff" opacity="0.9"/>
    <!-- Left arm resting on knee -->
    <path d="M-30 40 Q-55 50 -65 80 Q-70 95 -55 100" stroke="#e9d5ff" stroke-width="12" fill="none" stroke-linecap="round"/>
    <!-- Right arm — hand on heart -->
    <path d="M25 30 Q35 25 30 10 Q28 0 20 5" stroke="url(#skinTone)" stroke-width="10" fill="none" stroke-linecap="round"/>
    <!-- Hand on chest -->
    <circle cx="15" cy="15" r="8" fill="url(#skinTone)"/>

    <!-- Head -->
    <circle cx="0" cy="-35" r="28" fill="url(#skinTone)"/>
    <!-- Hair -->
    <path d="M-28 -40 Q-30 -70 -10 -68 Q5 -67 15 -65 Q30 -62 28 -40 Q29 -50 20 -55 Q10 -58 0 -60 Q-15 -62 -25 -50Z" fill="url(#hair)"/>
    <!-- Hair flowing -->
    <path d="M-28 -35 Q-35 -10 -38 15 Q-40 25 -35 30" stroke="url(#hair)" stroke-width="8" fill="none" stroke-linecap="round"/>
    <!-- Face details — eyes closed peacefully -->
    <path d="M-10 -35 Q-7 -33 -4 -35" stroke="#8b6f5e" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M6 -35 Q9 -33 12 -35" stroke="#8b6f5e" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Gentle smile -->
    <path d="M-5 -25 Q0 -22 5 -25" stroke="#8b6f5e" stroke-width="1.2" fill="none" stroke-linecap="round"/>

    <!-- Legs (sitting cross-legged) -->
    <path d="M-20 105 Q-40 120 -60 110 Q-75 105 -65 95" stroke="#6b7280" stroke-width="14" fill="none" stroke-linecap="round"/>
    <path d="M20 105 Q40 120 60 110 Q75 105 65 95" stroke="#6b7280" stroke-width="14" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Floating heart particles around the person -->
  <g opacity="0.5">
    <path d="M230 100 C228 95 222 95 222 100 C222 106 230 112 230 112 C230 112 238 106 238 100 C238 95 232 95 230 100Z" fill="#f9a8d4" transform="scale(0.6)"/>
    <path d="M250 180 C248 175 242 175 242 180 C242 186 250 192 250 192 C250 192 258 186 258 180 C258 175 252 175 250 180Z" fill="#f9a8d4" opacity="0.4" transform="scale(0.5) translate(200 -20)"/>
    <path d="M420 80 C418 75 412 75 412 80 C412 86 420 92 420 92 C420 92 428 86 428 80 C428 75 422 75 420 80Z" fill="#f9a8d4" opacity="0.3" transform="scale(0.4)"/>
  </g>

  <!-- Warm light sparkles -->
  <circle cx="500" cy="100" r="3" fill="#fef3c7" opacity="0.5"/>
  <circle cx="530" cy="140" r="2" fill="#fef3c7" opacity="0.4"/>
  <circle cx="480" cy="180" r="2.5" fill="#fef3c7" opacity="0.35"/>
  <circle cx="380" cy="90" r="2" fill="#fef3c7" opacity="0.3"/>
  <circle cx="440" cy="250" r="1.5" fill="#fef3c7" opacity="0.25"/>

  <!-- Decorative connection circles at bottom -->
  <g transform="translate(150, 350)" opacity="0.3">
    <circle r="25" fill="none" stroke="#ffffff" stroke-width="1"/>
    <circle r="15" fill="none" stroke="#ffffff" stroke-width="1"/>
    <circle r="5" fill="#ffffff" opacity="0.5"/>
  </g>
  <g transform="translate(680, 360)" opacity="0.25">
    <circle r="20" fill="none" stroke="#ffffff" stroke-width="1"/>
    <circle r="10" fill="none" stroke="#ffffff" stroke-width="1"/>
    <circle r="4" fill="#ffffff" opacity="0.5"/>
  </g>

  <!-- Soft wave at bottom -->
  <path d="M0 375 Q200 355 400 370 Q600 385 800 365 L800 400 L0 400Z" fill="#ffffff" opacity="0.05"/>
</svg>
