<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#312e81"/>
      <stop offset="40%" stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    <linearGradient id="blanket" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="pillow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#c7d2fe"/>
    </linearGradient>
    <linearGradient id="skinTone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#c4956a"/>
    </linearGradient>
    <linearGradient id="lampLight" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#fef3c7" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#fef3c7" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fef3c7" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#fef3c7" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#fef3c7" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.2"/>
    </filter>
    <filter id="lampGlow">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <!-- Background — deep night sky -->
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Stars -->
  <g fill="#ffffff">
    <circle cx="100" cy="40" r="1.5" opacity="0.7"/>
    <circle cx="200" cy="70" r="1" opacity="0.5"/>
    <circle cx="320" cy="30" r="1.8" opacity="0.6"/>
    <circle cx="450" cy="55" r="1" opacity="0.4"/>
    <circle cx="580" cy="25" r="1.5" opacity="0.55"/>
    <circle cx="700" cy="50" r="1" opacity="0.45"/>
    <circle cx="750" cy="90" r="1.3" opacity="0.5"/>
    <circle cx="150" cy="100" r="0.8" opacity="0.35"/>
    <circle cx="500" cy="80" r="1.2" opacity="0.4"/>
    <circle cx="650" cy="70" r="0.8" opacity="0.3"/>
    <!-- Twinkling stars -->
    <g transform="translate(260, 50)" opacity="0.6">
      <line x1="-5" y1="0" x2="5" y2="0" stroke="#ffffff" stroke-width="0.8"/>
      <line x1="0" y1="-5" x2="0" y2="5" stroke="#ffffff" stroke-width="0.8"/>
    </g>
    <g transform="translate(620, 40)" opacity="0.5">
      <line x1="-4" y1="0" x2="4" y2="0" stroke="#ffffff" stroke-width="0.8"/>
      <line x1="0" y1="-4" x2="0" y2="4" stroke="#ffffff" stroke-width="0.8"/>
    </g>
  </g>

  <!-- Window with moon -->
  <g filter="shadow">
    <rect x="550" y="40" width="140" height="180" rx="6" fill="#1e293b" opacity="0.5"/>
    <!-- Window frame -->
    <rect x="555" y="45" width="130" height="170" rx="4" fill="#1e3a5f" opacity="0.6"/>
    <line x1="620" y1="45" x2="620" y2="215" stroke="#ffffff" stroke-width="1.5" opacity="0.15"/>
    <line x1="555" y1="130" x2="685" y2="130" stroke="#ffffff" stroke-width="1.5" opacity="0.15"/>
    <!-- Moon through window -->
    <circle cx="640" cy="95" r="60" fill="url(#moonGlow)"/>
    <circle cx="640" cy="95" r="25" fill="#fef3c7" opacity="0.85"/>
    <circle cx="650" cy="88" r="22" fill="#1e3a5f" opacity="0.7"/>
    <!-- Curtain edges -->
    <path d="M555 45 Q560 100 558 170 Q556 200 555 215" stroke="#ffffff" stroke-width="6" opacity="0.08" fill="none"/>
    <path d="M685 45 Q680 100 682 170 Q684 200 685 215" stroke="#ffffff" stroke-width="6" opacity="0.08" fill="none"/>
  </g>

  <!-- Nightstand -->
  <g transform="translate(500, 230)">
    <rect x="-25" y="0" width="50" height="55" rx="4" fill="#ffffff" opacity="0.08"/>
    <!-- Lamp -->
    <rect x="-4" y="-25" width="8" height="25" rx="2" fill="#ffffff" opacity="0.15"/>
    <!-- Lampshade -->
    <path d="M-18 -45 Q0 -50 18 -45 L14 -25 Q0 -23 -14 -25Z" fill="#fef3c7" opacity="0.35"/>
    <!-- Lamp glow -->
    <ellipse cx="0" cy="-20" rx="60" ry="40" fill="url(#lampLight)" filter="lampGlow"/>
    <!-- Book on nightstand -->
    <rect x="-18" y="5" width="24" height="4" rx="1" fill="#a78bfa" opacity="0.3"/>
    <rect x="-17" y="3" width="22" height="4" rx="1" fill="#c4b5fd" opacity="0.25"/>
  </g>

  <!-- Bed frame -->
  <g>
    <!-- Headboard -->
    <rect x="60" y="180" width="30" height="120" rx="6" fill="#ffffff" opacity="0.06"/>
    <!-- Bed base -->
    <rect x="60" y="260" width="450" height="70" rx="8" fill="#ffffff" opacity="0.04"/>
  </g>

  <!-- Person sleeping in bed -->
  <g transform="translate(250, 250)">
    <!-- Blanket / duvet -->
    <path d="M-180 0 Q-150 -30 -50 -40 Q50 -50 150 -35 Q220 -25 260 0 Q270 20 260 30 L-180 30Z" fill="url(#blanket)" opacity="0.5"/>
    <!-- Blanket folds -->
    <path d="M-100 -25 Q-50 -35 0 -30 Q50 -25 100 -32" stroke="#ffffff" stroke-width="1" opacity="0.1" fill="none"/>
    <path d="M-150 -10 Q-80 -20 0 -15 Q80 -10 150 -18" stroke="#ffffff" stroke-width="0.8" opacity="0.08" fill="none"/>

    <!-- Pillow -->
    <ellipse cx="-120" cy="-35" rx="55" ry="22" fill="url(#pillow)" opacity="0.6"/>
    <!-- Pillow crease -->
    <path d="M-145 -35 Q-120 -28 -95 -35" stroke="#a5b4fc" stroke-width="0.8" opacity="0.3" fill="none"/>

    <!-- Head on pillow -->
    <circle cx="-115" cy="-50" r="24" fill="url(#skinTone)"/>
    <!-- Hair -->
    <path d="M-139 -55 Q-142 -78 -125 -78 Q-108 -78 -100 -70 Q-92 -62 -91 -50 Q-92 -58 -100 -64 Q-112 -72 -125 -70 Q-136 -68 -139 -55Z" fill="#5c4033" opacity="0.8"/>
    <!-- Closed eyes (peaceful sleep) -->
    <path d="M-125 -50 Q-120 -48 -115 -50" stroke="#a0785c" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <path d="M-108 -49 Q-103 -47 -98 -49" stroke="#a0785c" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <!-- Soft smile -->
    <path d="M-117 -42 Q-112 -39 -107 -42" stroke="#a0785c" stroke-width="1" fill="none" stroke-linecap="round"/>

    <!-- Shoulder visible above blanket -->
    <path d="M-95 -35 Q-80 -42 -60 -40" stroke="url(#skinTone)" stroke-width="14" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Zzz floating -->
  <g fill="#c4b5fd" opacity="0.5">
    <text x="180" y="180" font-family="sans-serif" font-size="22" font-weight="700">Z</text>
    <text x="200" y="155" font-family="sans-serif" font-size="17" font-weight="700" opacity="0.7">z</text>
    <text x="215" y="138" font-family="sans-serif" font-size="13" font-weight="700" opacity="0.5">z</text>
  </g>

  <!-- Soft floor line -->
  <path d="M0 340 L800 340" stroke="#ffffff" stroke-width="1" opacity="0.05"/>

  <!-- Floating particles (dust motes in lamplight) -->
  <circle cx="480" cy="200" r="2" fill="#fef3c7" opacity="0.15"/>
  <circle cx="460" cy="230" r="1.5" fill="#fef3c7" opacity="0.12"/>
  <circle cx="510" cy="215" r="1" fill="#fef3c7" opacity="0.1"/>

  <!-- Bottom wave -->
  <path d="M0 380 Q200 370 400 380 Q600 390 800 375 L800 400 L0 400Z" fill="#ffffff" opacity="0.03"/>
</svg>
