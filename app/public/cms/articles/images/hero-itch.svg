<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="50%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="skinTone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8c4a0"/>
      <stop offset="100%" stop-color="#d4a574"/>
    </linearGradient>
    <linearGradient id="cream" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>
    <linearGradient id="mirrorShine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)"/>
  <circle cx="700" cy="80" r="220" fill="#ffffff" opacity="0.04"/>
  <circle cx="80" cy="350" r="160" fill="#ffffff" opacity="0.03"/>

  <!-- Bathroom shelf / counter area (right side) -->
  <g transform="translate(580, 80)" opacity="0.5">
    <!-- Shelf -->
    <rect x="-10" y="0" width="160" height="6" rx="3" fill="#ffffff" opacity="0.2"/>
    <!-- Bottle 1 -->
    <rect x="10" y="-50" width="22" height="48" rx="5" fill="#ffffff" opacity="0.25"/>
    <rect x="14" y="-55" width="14" height="8" rx="3" fill="#ffffff" opacity="0.15"/>
    <!-- Bottle 2 -->
    <rect x="45" y="-38" width="18" height="36" rx="4" fill="#ffffff" opacity="0.2"/>
    <circle cx="54" cy="-42" r="6" fill="#ffffff" opacity="0.15"/>
    <!-- Tube -->
    <rect x="80" y="-35" width="16" height="33" rx="8" fill="#ffffff" opacity="0.22"/>
    <rect x="83" y="-38" width="10" height="6" rx="2" fill="#ffffff" opacity="0.15"/>
    <!-- Lower shelf -->
    <rect x="-10" y="60" width="160" height="6" rx="3" fill="#ffffff" opacity="0.15"/>
    <!-- Towel on lower shelf -->
    <path d="M20 60 L20 40 Q30 35 50 38 Q70 41 80 40 L80 60Z" fill="#ffffff" opacity="0.12"/>
  </g>

  <!-- Person applying cream — center-left -->
  <g transform="translate(280, 140)">
    <!-- Torso (t-shirt) -->
    <path d="M-45 30 Q-50 0 -25 -15 Q-5 -25 15 -15 Q40 0 35 30 Q30 80 0 95 Q-30 80 -45 30Z" fill="#ffffff" opacity="0.3"/>

    <!-- Head -->
    <circle cx="-5" cy="-55" r="32" fill="url(#skinTone)"/>
    <!-- Hair (short, modern) -->
    <path d="M-37 -60 Q-38 -90 -15 -92 Q5 -93 20 -90 Q37 -85 35 -60 Q36 -72 25 -78 Q10 -84 -5 -85 Q-22 -84 -32 -72Z" fill="#5c4033"/>
    <!-- Eyes (looking at arm) -->
    <circle cx="-15" cy="-55" r="3" fill="#5c4033"/>
    <circle cx="8" cy="-55" r="3" fill="#5c4033"/>
    <circle cx="-14" cy="-55.5" r="1.2" fill="#ffffff"/>
    <circle cx="9" cy="-55.5" r="1.2" fill="#ffffff"/>
    <!-- Gentle mouth -->
    <path d="M-8 -44 Q-3 -41 3 -44" stroke="#a0785c" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- Right arm extended (being treated) -->
    <path d="M30 10 Q60 5 90 10 Q120 15 145 10" stroke="url(#skinTone)" stroke-width="16" fill="none" stroke-linecap="round"/>
    <!-- Forearm detail — skin texture dots (subtle) -->
    <g opacity="0.15">
      <circle cx="80" cy="8" r="3" fill="#c9956a"/>
      <circle cx="95" cy="14" r="2.5" fill="#c9956a"/>
      <circle cx="110" cy="9" r="2" fill="#c9956a"/>
      <circle cx="70" cy="14" r="2" fill="#c9956a"/>
    </g>

    <!-- Left hand applying cream -->
    <path d="M-40 15 Q-55 0 -50 -10 Q-45 -15 -35 -5 Q-20 10 10 12" stroke="url(#skinTone)" stroke-width="14" fill="none" stroke-linecap="round"/>
    <!-- Cream blob on arm -->
    <ellipse cx="90" cy="5" rx="15" ry="8" fill="#ffffff" opacity="0.85"/>
    <ellipse cx="88" cy="3" rx="8" ry="4" fill="#ffffff" opacity="0.95"/>

    <!-- Fingers applying -->
    <circle cx="80" cy="5" r="6" fill="url(#skinTone)"/>
    <circle cx="72" cy="3" r="5" fill="url(#skinTone)"/>
  </g>

  <!-- Shield / protection motif (upper right) -->
  <g transform="translate(630, 200)" filter="shadow" opacity="0.6">
    <path d="M0-45 L35-30 L35 10 C35 35 18 50 0 58 C-18 50 -35 35 -35 10 L-35-30Z"
          fill="#ffffff" opacity="0.2" stroke="#ffffff" stroke-width="1.5"/>
    <!-- Checkmark inside -->
    <path d="M-10 5 L-3 14 L14-8" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  </g>

  <!-- Cooling snowflake elements -->
  <g opacity="0.15" stroke="#ffffff" stroke-width="1.2" fill="none">
    <g transform="translate(150, 80)">
      <line x1="0" y1="-12" x2="0" y2="12"/>
      <line x1="-10" y1="-6" x2="10" y2="6"/>
      <line x1="-10" y1="6" x2="10" y2="-6"/>
      <circle cx="0" cy="-12" r="2" fill="#ffffff"/>
      <circle cx="0" cy="12" r="2" fill="#ffffff"/>
    </g>
    <g transform="translate(720, 320)">
      <line x1="0" y1="-10" x2="0" y2="10"/>
      <line x1="-8" y1="-5" x2="8" y2="5"/>
      <line x1="-8" y1="5" x2="8" y2="-5"/>
      <circle cx="0" cy="-10" r="1.5" fill="#ffffff"/>
      <circle cx="0" cy="10" r="1.5" fill="#ffffff"/>
    </g>
  </g>

  <!-- Soothing wave lines -->
  <g opacity="0.12" stroke="#ffffff" stroke-width="1.5" fill="none">
    <path d="M50 300 Q100 285 150 300 Q200 315 250 300 Q300 285 350 300"/>
    <path d="M450 320 Q500 305 550 320 Q600 335 650 320 Q700 305 750 320"/>
  </g>

  <!-- Floating particles -->
  <circle cx="180" cy="200" r="3" fill="#ffffff" opacity="0.2"/>
  <circle cx="500" cy="100" r="2.5" fill="#ffffff" opacity="0.15"/>
  <circle cx="700" cy="170" r="4" fill="#ffffff" opacity="0.1"/>
  <circle cx="100" cy="130" r="2" fill="#ffffff" opacity="0.18"/>

  <!-- Bottom wave -->
  <path d="M0 370 Q200 355 400 370 Q600 385 800 365 L800 400 L0 400Z" fill="#ffffff" opacity="0.05"/>
</svg>
